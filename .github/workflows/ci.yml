name: ci

on:
  push:
    tags-ignore:
      - '**'
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'LICENSE'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.platform }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-24.04
            binary_name: weixin-mcp-rs
            package_name: weixin-mcp-rs-linux.tar.gz
          - platform: macos
            runs_on: macOS-15
            binary_name: weixin-mcp-rs
            package_name: weixin-mcp-rs-macos.tar.gz
          - platform: windows
            runs_on: windows-2025
            binary_name: weixin-mcp-rs.exe
            package_name: weixin-mcp-rs-windows.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release Binary
        run: cargo build --locked --release

      - name: Package Linux and macOS Binary
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.package_name }}" -C target/release "${{ matrix.binary_name }}"

      - name: Package Windows Binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/release/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.package_name }}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}-binary
          path: ${{ matrix.package_name }}
          if-no-files-found: error

  release:
    name: publish-latest-release
    needs: build
    runs-on: ubuntu-24.04
    if: |
      github.event_name != 'pull_request' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Upload Assets To Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          files: dist/*
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
